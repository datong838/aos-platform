# AOS local Dev prerequisites ONLY — never ship in customer dist.
# Spec: docs/palantier/20_tech/24 §4 · 23 R-INST / R-LIC · 33 T3.9 LiteLLM · 37 T4.8 OCR · 110 TA.1 analytics
# Usage: docker compose -f deploy/dev/docker-compose.yml up -d

name: aos-dev-prereq

services:
  aos-dev-pg:
    image: postgres:16-alpine
    container_name: aos-dev-pg
    environment:
      POSTGRES_USER: aos_app
      POSTGRES_PASSWORD: aos_dev_only_change_me
      POSTGRES_DB: aos_meta
    ports:
      - "5433:5432"
    volumes:
      - aos_dev_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aos_app -d aos_meta"]
      interval: 5s
      timeout: 5s
      retries: 10

  aos-dev-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: aos-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aosdev
      MINIO_ROOT_PASSWORD: aos_dev_only_change_me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aos_dev_minio_data:/data
    # MinIO image may lack curl/wget; readiness proven by init job + host probe.
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # One-shot: create bucket aos-media (Dev only)
  aos-dev-minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: aos-dev-minio-init
    depends_on:
      aos-dev-minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://aos-dev-minio:9000 aosdev aos_dev_only_change_me;
      mc mb -p local/aos-media || true;
      mc anonymous set none local/aos-media;
      echo minio-init-ok;
      "

  # T3.9 — LiteLLM sidecar (Dev only; UI never talks to this)
  aos-dev-llm-echo:
    build: ./llm-echo
    container_name: aos-dev-llm-echo
    ports:
      - "8081:8081"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health')\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  aos-dev-litellm:
    build: ./litellm
    container_name: aos-dev-litellm
    environment:
      LITELLM_MASTER_KEY: aos_dev_litellm_master
      AOS_LLM_UPSTREAM_KEY: aos_dev_upstream_only
      AOS_LLM_UPSTREAM_BASE: http://aos-dev-llm-echo:8081/v1
      AOS_LITELLM_MODEL: aos-dev
    ports:
      - "4001:4000"
    depends_on:
      aos-dev-llm-echo:
        condition: service_healthy

  # T4.8 — OCR sidecar (Dev only; UI never talks to this; optional paddleocr inside image)
  aos-dev-ocr:
    build: ./ocr-sidecar
    container_name: aos-dev-ocr
    ports:
      - "8082:8082"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health')\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # TA.1 / 110 · analytics-runtime · 157 真 Jupyter（Notebook 7）MVP
  # Host :8084 = ticket Facade；:8888 = Jupyter UI（ticket 302 后）。勿占 8083（Keycloak）。
  aos-dev-analytics:
    build: ./analytics-runtime
    container_name: aos-dev-analytics
    environment:
      AOS_ANALYTICS_ENGINE: jupyter
      AOS_JUPYTER_ROOT: /notebooks
      AOS_JUPYTER_PORT: "8888"
      AOS_JUPYTER_PUBLIC_URL: http://127.0.0.1:8888
      AOS_ANALYTICS_PUBLIC_URL: http://127.0.0.1:8084
      AOS_ANALYTICS_TICKET_TTL_SEC: "900"
    ports:
      - "8084:8084"
      - "8888:8888"
    volumes:
      - ./analytics-runtime/notebooks:/notebooks
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/health')\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 40s

  # T4.6 — Dev MySQL source (customer brings own DB in prod; not in customer AOS package)
  aos-dev-mysql:
    image: mysql:8.4
    container_name: aos-dev-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: aos_dev_only_change_me
      MYSQL_DATABASE: aos_src
      MYSQL_USER: aos_src
      MYSQL_PASSWORD: aos_dev_only_change_me
    ports:
      - "3307:3306"
    volumes:
      - aos_dev_mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uaos_src", "-paos_dev_only_change_me"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # TX.3 / B-TX3-01 — Dev Keycloak (optional; NOT in customer package)
  # Usage: docker compose -f deploy/dev/docker-compose.yml --profile oidc up -d aos-dev-keycloak
  # HA:    docker compose -f deploy/dev/docker-compose.yml --profile oidc-ha up -d
  #        (mutually exclusive with profile oidc — both bind host :8083)
  aos-dev-keycloak:
    image: quay.io/keycloak/keycloak:26.0.2
    container_name: aos-dev-keycloak
    profiles: ["oidc"]
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: aos_dev_only_change_me
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: 127.0.0.1
      KC_HOSTNAME_PORT: "8083"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8083:8080"
    volumes:
      - ./keycloak/aos-realm.json:/opt/keycloak/data/import/aos-realm.json:ro
    # Image has no curl; readiness proven by host probe script (JWKS 200).
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s

  # —— scheme 57 · Dev HA Keycloak (shared DB + 2 nodes + nginx) ——
  aos-dev-kc-db:
    image: postgres:16-alpine
    container_name: aos-dev-kc-db
    profiles: ["oidc-ha"]
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: aos_dev_only_change_me
      POSTGRES_DB: keycloak
    volumes:
      - aos_dev_kc_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 15

  aos-dev-keycloak-a:
    image: quay.io/keycloak/keycloak:26.0.2
    container_name: aos-dev-keycloak-a
    profiles: ["oidc-ha"]
    depends_on:
      aos-dev-kc-db:
        condition: service_healthy
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: aos_dev_only_change_me
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: 127.0.0.1
      KC_HOSTNAME_PORT: "8083"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://aos-dev-kc-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: aos_dev_only_change_me
    volumes:
      - ./keycloak/aos-realm.json:/opt/keycloak/data/import/aos-realm.json:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s

  aos-dev-keycloak-b:
    image: quay.io/keycloak/keycloak:26.0.2
    container_name: aos-dev-keycloak-b
    profiles: ["oidc-ha"]
    depends_on:
      aos-dev-kc-db:
        condition: service_healthy
      aos-dev-keycloak-a:
        condition: service_started
    command:
      - start-dev
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: aos_dev_only_change_me
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: 127.0.0.1
      KC_HOSTNAME_PORT: "8083"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://aos-dev-kc-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: aos_dev_only_change_me
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s

  aos-dev-keycloak-lb:
    image: nginx:1.27-alpine
    container_name: aos-dev-keycloak-lb
    profiles: ["oidc-ha"]
    depends_on:
      - aos-dev-keycloak-a
      - aos-dev-keycloak-b
    ports:
      - "8083:80"
    volumes:
      - ./keycloak/nginx-ha.conf:/etc/nginx/conf.d/default.conf:ro

  # TX.4 / T-CROSS — OpenFGA Dev sidecar (scheme 58; NOT customer package)
  # Usage: docker compose -f deploy/dev/docker-compose.yml --profile openfga up -d
  #        .\scripts\ci\bootstrap-openfga.ps1
  aos-dev-openfga:
    image: openfga/openfga:v1.8.4
    container_name: aos-dev-openfga
    profiles: ["openfga"]
    command: ["run"]
    environment:
      OPENFGA_PLAYGROUND_ENABLED: "false"
      OPENFGA_LOG_FORMAT: json
    ports:
      - "8085:8080"
      - "8086:8081"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  aos_dev_pg_data:
  aos_dev_minio_data:
  aos_dev_mysql_data:
  aos_dev_kc_pg_data:
