# Dev HA Keycloak LB — scheme 57 (profile oidc-ha only; NOT customer package)
upstream aos_keycloak {
    least_conn;
    server aos-dev-keycloak-a:8080 max_fails=3 fail_timeout=10s;
    server aos-dev-keycloak-b:8080 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    location / {
        proxy_pass http://aos_keycloak;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8083;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
