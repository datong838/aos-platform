# LOCAL DEV ONLY — fake secrets. Do not copy into customer packages.
# Spec: 24-AOS客户侧前置组件安装SOP.md
schemaVersion: "1"
environment: lite
customerOrg: LOCAL_DEV
filledBy: agent-driver
date: "2026-07-17"

litellm:
  url: http://127.0.0.1:4000
  model: aos-dev
  apiKeyRef: "vault:secret/data/aos/llm#master"
  masterKeyRef: "local-dev-file:deploy/dev/.secrets.env#AOS_LLM_MASTER_KEY"
  # Host mode: deploy/dev/start-llm-sidecar-host.ps1
  # Compose: aos-dev-litellm + aos-dev-llm-echo (若 Windows↔WSL 端口不通，用 WSL IP 或 host 模式)

postgres:
  host: 127.0.0.1
  # 若本机 127.0.0.1:5433 不通：用 `wsl -d Ubuntu -e hostname -I` 首 IP
  port: 5433
  database: aos_meta
  user: aos_app
  passwordRef: "local-dev-file:deploy/dev/.secrets.env#POSTGRES_PASSWORD"
  ageExtensionReady: false

objectStore:
  provider: minio
  endpoint: http://127.0.0.1:9000
  bucket: aos-media
  region: us-east-1
  pathStyle: true
  accessKeyRef: "local-dev-file:deploy/dev/.secrets.env#MINIO_ROOT_USER"
  secretKeyRef: "local-dev-file:deploy/dev/.secrets.env#MINIO_ROOT_PASSWORD"

redis:
  urlRef: "optional: host 127.0.0.1:6379 if available"

oidc:
  issuer: "dev-token-placeholder"
  clientId: aos-web-dev
  clientSecretRef: "n/a-wave0"

vault:
  # Lite sealed-file path TBD; Wave-0 uses env for local only
  liteSealedFile: "n/a-wave0"

observability:
  prometheusUrl: ""
  grafanaUrl: ""

network:
  spokeEgressToHubOk: false
  httpsProxy: ""

versions:
  postgres: "16-alpine"
  minio: "RELEASE.2025-04-22T22-12-26Z"

checklistSigned: false
notes: |
  Agent-installed Dev stack under aos-platform/deploy/dev/.
  MinIO/Grafana MUST NOT ship inside AOS customer package (23 R-LIC-01).
  AGE extension not installed yet (Ontology graph later).
