# Dev defaults — Full Spoke stub (158). Do not ship secrets in values for customer packs.
replicaCount: 1
image:
  repository: aos/spoke-agent
  tag: "0.3.0-dev"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8080
spoke:
  id: spoke-full-stub
  hub: dev-hub
  channel: staging
  mode: full
  outboundPoll: true
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
